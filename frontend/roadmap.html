<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PathMind — Your Roadmap</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; margin-right: 6px;">
        <circle cx="12" cy="12" r="10" stroke="#6c63ff" stroke-width="2"/>
        <circle cx="12" cy="12" r="3" fill="#6c63ff"/>
        <line x1="12" y1="2" x2="12" y2="6" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="18" x2="12" y2="22" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="12" x2="6" y2="12" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="18" y1="12" x2="22" y2="12" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <polyline points="12,12 15,8" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      PathMind
    </div>

    <div class="nav-links">
      <a href="progress.html">Progress</a>
      <a href="schedule.html">Today's Plan</a>
      <a href="readiness.html">Readiness Score</a>
      <label class="theme-switch" title="Toggle dark/light mode">
        <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
        <span class="slider"></span>
      </label>
      <div class="notification-bell" id="notificationBell" onclick="toggleNotifications()">
        🔔 <span class="notif-count" id="notifCount">0</span>
        <div class="notification-dropdown hidden" id="notificationDropdown">
        </div>
      </div>
    </div>
  </nav>

  <section class="roadmap-section">
    <div class="roadmap-header">
      <h1>Your personalized roadmap</h1>
      <p id="roadmapSubtitle">Loading your roadmap...</p>
    </div>

    <div class="roadmap-container" id="roadmapContainer">
    </div>
  </section>

  <div id="quizModal" class="quiz-modal hidden">
    <div class="quiz-modal-content">
      <div class="quiz-modal-header">
        <h2 id="quizTopic">Quiz</h2>
        <button onclick="closeQuizModal()" class="close-btn">✕</button>
      </div>
      <div id="quizBody" class="quiz-body"></div>
      <div class="quiz-footer">
        <button id="submitQuizBtn" class="btn-primary" onclick="submitQuiz()">Submit answers</button>
      </div>
    </div>
  </div>

  <script src="js/roadmap.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
