<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PathMind — Today's Plan</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; margin-right: 6px;">
        <circle cx="12" cy="12" r="10" stroke="#6c63ff" stroke-width="2"/>
        <circle cx="12" cy="12" r="3" fill="#6c63ff"/>
        <line x1="12" y1="2" x2="12" y2="6" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="18" x2="12" y2="22" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="12" x2="6" y2="12" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="18" y1="12" x2="22" y2="12" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <polyline points="12,12 15,8" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      PathMind
    </div>

    <div class="nav-links">
      <a href="roadmap.html">Roadmap</a>
      <a href="progress.html">Progress</a>
      <a href="readiness.html">Readiness Score</a>
      <label class="theme-switch" title="Toggle dark/light mode">
        <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
        <span class="slider"></span>
      </label>
    </div>
  </nav>

  <section class="schedule-section">
    <div class="schedule-header">
      <h1>What's today's plan?</h1>
      <p>Tell us how much time you have today and we will build your perfect study plan.</p>
    </div>

    <div class="time-selector">
      <button class="time-btn" onclick="getSchedule(30)">30 mins</button>
      <button class="time-btn" onclick="getSchedule(60)">1 hour</button>
      <button class="time-btn" onclick="getSchedule(120)">2 hours</button>
      <button class="time-btn" onclick="getSchedule(240)">4 hours</button>
      <button class="time-btn" onclick="getSchedule(480)">Full day</button>
    </div>

    <div id="scheduleResult" class="schedule-result">
      <p style="color:#aaa; text-align:center;">Select your available time above to get today's plan</p>
    </div>

    <div id="mockQuestions" class="mock-questions-section">
      <p style="color:#aaa; text-align:center;">Select your available time above to get today's plan and interview questions</p>
    </div>
  </section>

  <script src="js/schedule.js"></script>
  <script src="js/theme.js"></script>
  
</body>
</html>
