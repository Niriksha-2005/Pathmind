<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PathMind — Your Progress</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; margin-right: 6px;">
        <circle cx="12" cy="12" r="10" stroke="#6c63ff" stroke-width="2"/>
        <circle cx="12" cy="12" r="3" fill="#6c63ff"/>
        <line x1="12" y1="2" x2="12" y2="6" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="18" x2="12" y2="22" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="12" x2="6" y2="12" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="18" y1="12" x2="22" y2="12" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <polyline points="12,12 15,8" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      PathMind
    </div>

    <div class="nav-links">
      <a href="roadmap.html">Roadmap</a>
      <a href="schedule.html">Today's Plan</a>
      <a href="readiness.html">Readiness Score</a>
      <label class="theme-switch" title="Toggle dark/light mode">
        <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
        <span class="slider"></span>
      </label>
    </div>
  </nav>

  <section class="progress-section">
    <div class="progress-header">
      <h1>Your progress</h1>
      <p id="progressSubtitle">Loading your progress...</p>
    </div>

    <div class="progress-circle-container">
      <div class="progress-circle" id="progressCircle">
        <span id="progressPercentage">0%</span>
      </div>
      <div class="progress-stats">
        <div class="stat-box">
          <h3 id="completedCount">0</h3>
          <p>Topics completed</p>
        </div>
        <div class="stat-box">
          <h3 id="totalCount">0</h3>
          <p>Total topics</p>
        </div>
        <div class="stat-box">
          <h3 id="remainingCount">0</h3>
          <p>Remaining</p>
        </div>
      </div>
    </div>

    <div class="completed-topics" id="completedTopics">
    </div>
  </section>

  <script src="js/progress.js"></script>
  <script src="js/theme.js"></script>
  
</body>
</html>
