<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PathMind — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; margin-right: 6px;">
        <circle cx="12" cy="12" r="10" stroke="#6c63ff" stroke-width="2"/>
        <circle cx="12" cy="12" r="3" fill="#6c63ff"/>
        <line x1="12" y1="2" x2="12" y2="6" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="18" x2="12" y2="22" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="12" x2="6" y2="12" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <line x1="18" y1="12" x2="22" y2="12" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
        <polyline points="12,12 15,8" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      PathMind
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="signup.html">Sign Up</a>
      <label class="theme-switch" title="Toggle dark/light mode">
        <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
        <span class="slider"></span>
      </label>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-header">
        <h1>Welcome back</h1>
        <p>Login to continue your placement journey</p>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter your password">
          <span class="eye-icon" onclick="togglePassword('password')">👁️</span>
        </div>
      </div>

      <button class="btn-primary full-width" id="loginBtn" onclick="login()">
        Login
      </button>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up here</a></p>

    </div>
  </section>

  <script src="js/login.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
