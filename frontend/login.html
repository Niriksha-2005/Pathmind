<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PathMind — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">PathMind</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="signup.html">Sign Up</a>
      <label class="theme-switch" title="Toggle dark/light mode">
        <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
        <span class="slider"></span>
      </label>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-header">
        <h1>Welcome back</h1>
        <p>Login to continue your placement journey</p>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter your password">
          <span class="eye-icon" onclick="togglePassword('password')">👁️</span>
        </div>
      </div>

      <button class="btn-primary full-width" id="loginBtn" onclick="login()">
        Login
      </button>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up here</a></p>

    </div>
  </section>

  <script src="js/login.js"></script>
</body>
</html>
